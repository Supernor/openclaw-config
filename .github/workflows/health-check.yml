name: Gateway Health Check

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check gateway health
        id: check
        run: |
          # Try to reach the gateway health endpoint
          # This will fail if VPS is down or gateway is crashed
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "https://your-domain-here:18789/health" 2>/dev/null || echo "000")
          echo "status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::Gateway returned HTTP $HTTP_STATUS"
          fi

      - name: Create issue on failure
        if: steps.check.outputs.status != 200
        uses: actions/github-script@v7
        with:
          script: |
            const status = "${{ steps.check.outputs.status }}";
            // Check for existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: "health-check,automated",
              state: "open"
            });
            if (issues.data.length > 0) {
              // Comment on existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `Health check still failing at ${new Date().toISOString()}. HTTP status: ${status}`
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 Gateway Health Check Failed (HTTP ${status})`,
                body: `## Gateway Unreachable\n\nThe scheduled health check could not reach the gateway.\n\n**HTTP Status:** ${status}\n**Time:** ${new Date().toISOString()}\n\nThis may mean:\n- VPS is down\n- Gateway process crashed\n- Network issue\n\nCheck: \`docker compose ps\` and \`docker compose logs openclaw-gateway --tail 50\``,
                labels: ["health-check", "automated", "incident"]
              });
            }

      - name: Close issue on recovery
        if: steps.check.outputs.status == 200
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: "health-check,automated",
              state: "open"
            });
            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ Gateway recovered at ${new Date().toISOString()}`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: "closed"
              });
            }
